<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HELIOS ONLINE</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #10213b 0%, #05070c 28%, #010205 100%);
        color: #eff7ff;
        font-family: "Segoe UI Variable", "Aptos", sans-serif;
      }

      #scene-root,
      #ui {
        position: absolute;
        inset: 0;
      }

      #ui {
        pointer-events: none;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="scene-root"></div>
      <div id="ui"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
